name: RAG Evaluation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-md

      - name: Run Unit Tests
        run: pytest tests/ -v --tb=short
        continue-on-error: false

      - name: Run Benchmark (word-overlap heuristic)
        run: |
          python -c "
          from solution.solution import QAPair, RAGASEvaluator, BenchmarkRunner

          # Load 20 QA pairs from exercises.md (mini version)
          qa_pairs = [
              QAPair('What is RAG?',
                     'RAG stands for Retrieval-Augmented Generation.',
                     'RAG is a technique that retrieves documents.',
                     {'difficulty': 'easy'}),
              QAPair('What is the capital of France?',
                     'Paris is the capital of France.',
                     'France is a country. Its capital city is Paris.',
                     {'difficulty': 'easy'}),
              QAPair('What does LLM stand for?',
                     'LLM stands for Large Language Model.',
                     'Large Language Models are neural networks.',
                     {'difficulty': 'easy'}),
              QAPair('What is the main component of gradient descent?',
                     'The learning rate controls step size.',
                     'Gradient descent uses a learning rate.',
                     {'difficulty': 'easy'}),
              QAPair('What does GPU stand for?',
                     'GPU stands for Graphics Processing Unit.',
                     'GPU is specialized hardware for parallel computation.',
                     {'difficulty': 'easy'}),
              QAPair('Explain backpropagation',
                     'Backpropagation computes gradients efficiently.',
                     'Backpropagation computes gradients layer by layer.',
                     {'difficulty': 'medium'}),
              QAPair('Should I use RAG or fine-tuning?',
                     'RAG for fresh knowledge, fine-tuning for style.',
                     'RAG retrieves at inference. Fine-tuning modifies weights.',
                     {'difficulty': 'hard'}),
              QAPair('What is the meaning of life?',
                     'Out of scope. I help with AI/tech questions.',
                     'AI assistant specialized in technology.',
                     {'difficulty': 'adversarial'}),
          ]

          def mock_agent(q): return f'Based on knowledge: {q[:20]}... involves AI concepts.'

          ev = RAGASEvaluator()
          runner = BenchmarkRunner()
          results = runner.run(qa_pairs, mock_agent, ev)
          report = runner.generate_report(results)

          print(f'=== CI/CD Quality Gate ===')
          print(f'Total: {report[\"total\"]}')
          print(f'Passed: {report[\"passed\"]}')
          print(f'Pass Rate: {report[\"pass_rate\"]*100:.1f}%')
          print(f'Avg Faithfulness: {report[\"avg_faithfulness\"]:.4f}')
          print(f'Avg Relevance: {report[\"avg_relevance\"]:.4f}')
          print(f'Avg Completeness: {report[\"avg_completeness\"]:.4f}')
          print(f'Failure Types: {report[\"failure_types\"]}')
          "

      - name: Quality Gate Check
        run: |
          python -c "
          from solution.solution import QAPair, RAGASEvaluator, BenchmarkRunner

          qa_pairs = [
              QAPair('What is RAG?',
                     'RAG stands for Retrieval-Augmented Generation.',
                     'RAG is a technique that retrieves documents.',
                     {'difficulty': 'easy'}),
              QAPair('What is the capital of France?',
                     'Paris is the capital of France.',
                     'France is a country. Its capital city is Paris.',
                     {'difficulty': 'easy'}),
              QAPair('What is the meaning of life?',
                     'Out of scope. I help with AI/tech questions.',
                     'AI assistant specialized in technology.',
                     {'difficulty': 'adversarial'}),
          ]

          def mock_agent(q): return f'Based on knowledge: {q[:20]}... involves AI concepts.'

          ev = RAGASEvaluator()
          runner = BenchmarkRunner()
          results = runner.run(qa_pairs, mock_agent, ev)
          report = runner.generate_report(results)

          # Quality gate: faithfulness >= 0.7 is 'pass' (from lecture)
          faithfulness = report['avg_faithfulness']
          print(f'Faithfulness: {faithfulness:.4f}')
          if faithfulness < 0.7:
              print(f'❌ QUALITY GATE FAILED: Faithfulness {faithfulness:.4f} < 0.7')
              exit(1)
          print(f'✅ QUALITY GATE PASSED: Faithfulness {faithfulness:.4f} >= 0.7')
          exit(0)
          "
        continue-on-error: true

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json
        continue-on-error: true